name: 撰寫書評 → 上線 painpoint /lens

# ────────────────────────────────────────────────────────────────────
# 手機怎麼觸發:GitHub App 或手機瀏覽器開這個 repo → Actions 分頁
#   → 左側點「撰寫書評 → 上線 painpoint /lens」→ 右上 Run workflow
#   → 打書名(例:原子習慣)→ Run。
#
# 雲端會跑完整條鏈(照 CLAUDE.md 總則,不靠你的 Mac):
#   喵喵書評定稿 → painpoint 拆書 → 自審(fix-punctuation / count-contrast / php -l / 本機 render)
#   → commit + push → 機械閘門全過了才 rsync 部署到 Cloudways → 回報 /lens/{slug} 網址。
#
# 需要兩個 GitHub Secret(設定見 .github/CLOUD-SETUP.md):
#   CLAUDE_CODE_OAUTH_TOKEN  跑你現有的 Claude 訂閱(claude setup-token 產的)
#   CLOUDWAYS_SSH_KEY        Cloudways 部署私鑰(= 你本機 ~/.ssh/cloudways-painpoint 的內容)
# ────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      book_name:
        description: '書名(不用加《》,例:原子習慣)'
        required: true
        type: string
      lane:
        description: '帳號 lane(a=預設;b=用第二個 Claude 帳號 secret CLAUDE_CODE_OAUTH_TOKEN_B)'
        required: false
        default: 'a'
        type: string
  repository_dispatch:        # Telegram 隊列用這個觸發(帶 client_payload.book_name / author / lane)
    types: [write-review]

concurrency:                  # 同一個 lane 一次只跑一篇(避免同帳號自撞);a、b 不同 group → 兩個帳號可平行各跑一篇。
  group: write-review-${{ github.event.client_payload.lane || inputs.lane || 'a' }}
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write         # 讓 Claude 能 git push 回 main
      id-token: write         # claude-code-action 內部要
    env:
      # —— Cloudways 部署座標(非機密,與本機 deploy.sh 一致)——
      SSH_HOST: master_wqcrjzcjvx@167.179.112.129
      REMOTE_PATH: applications/afrmpvsrbj/public_html/

    steps:
      - name: 取出 repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 記錄動工前 commit(之後用來找新拆書)
        run: echo "BEFORE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: 防呆 — CI 暫存路徑不可進版控(在燒 Opus 之前先擋)
        run: |
          # 2026-06-30 慘痛教訓:.ci/slug.txt、.ci/review.txt 是步驟間傳遞用的 runner scratch,本該 untracked。
          #   一旦被誤 commit 成 tracked,之後每次寫書都會在 push 前的 git rebase 報 "unstaged changes" → 整批白燒。
          # 這步在「決定書名、跑 Claude」之前就擋下,確認暫存路徑沒有任何一個變成 tracked;有 → 直接 fail、不浪費 Opus。
          echo "STAGE=暫存路徑防呆" >> "$GITHUB_ENV"
          bad="$(git ls-files | grep -E '^\.ci/' || true)"
          if [ -n "$bad" ]; then
            echo "::error::暫存路徑被誤 commit 進版控(應為 untracked):"; echo "$bad"
            echo "::error::修法:git rm --cached -r .ci/ 並確認 .gitignore 內有 .ci/,然後 commit + push。"
            exit 1
          fi
          echo "暫存路徑乾淨(.ci/ 未被追蹤)。"

      - name: 決定書名 + 作者(手動觸發 或 Telegram 觸發)
        env:
          IN_BOOK_INPUT: ${{ inputs.book_name }}
          IN_BOOK_DISPATCH: ${{ github.event.client_payload.book_name }}
          IN_AUTHOR: ${{ github.event.client_payload.author }}
          IN_LANE: ${{ github.event.client_payload.lane || inputs.lane || 'a' }}
        run: |
          BOOK="${IN_BOOK_INPUT:-$IN_BOOK_DISPATCH}"
          if [ -z "$BOOK" ]; then echo "::error::沒有收到書名"; exit 1; fi
          LANE="$IN_LANE"; [ "$LANE" = "b" ] || LANE="a"   # 只認 a / b,其餘一律當 a
          {
            echo "BOOK_NAME=$BOOK"
            echo "LANE=$LANE"
            if [ -n "$IN_AUTHOR" ]; then
              echo "AUTHOR_NOTE=(作者:$IN_AUTHOR — 用作者確認是哪一本/哪個版本、別寫錯書)"
            else
              echo "AUTHOR_NOTE="
            fi
          } >> "$GITHUB_ENV"
          mkdir -p .ci
          echo "本次 lane = $LANE"

      - name: 設定 git 身分(Claude commit 用)
        run: |
          git config user.name  "painpoint 雲端"
          git config user.email "altruismlife@gmail.com"

      - name: 預檢 — 這本已上線就跳過整篇重寫(看門狗把已上線的書排回來時不白寫一次)
        run: |
          # 為什麼要這步:某本「寫成功、上線成功,只是最後那通回報掉了(Cloudways 415 / SSH 偶斷)」,
          #   看門狗 30 分後會把它丟回隊列重寫 → 白燒一次 Opus、還可能覆蓋掉線上那篇好的(實測踩過《資本主義…23件事》)。
          # 怎麼判:① 用書名到 _articles.php 反查 slug(checkout 的是最新 origin/main,已含上次成功 commit 的那筆);
          #         ② slug 對到了,再 curl 線上 /lens/{slug} 真的回 200,才算「確實已上線」→ 設 ALREADY_LIVE=1。
          # 安全性:只有「對到 slug + 線上 200」兩者都成立才跳過。
          #   - 沒寫過的書 → _articles.php 查不到 → 照常開寫。
          #   - 寫過但當初『品質閘沒過、沒部署』的書(Claude 先 commit、閘門才擋下部署)→ 線上 404 → 照常重寫,不會被誤跳。
          #   - 萬一 curl 撞到 415(偽陰性)→ 頂多照舊重寫一次,無害。
          SLUG_EXIST="$(php tools/find-lens-slug.php "$BOOK_NAME" 2>/dev/null || true)"
          if [ -z "$SLUG_EXIST" ]; then
            echo "_articles.php 沒對到既有 slug → 照常開寫。"
            exit 0
          fi
          code=000
          for attempt in 1 2 3; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 20 \
                     "https://painpoint.tw/lens/$SLUG_EXIST" || echo 000)
            echo "對到 slug=$SLUG_EXIST,線上狀態碼(第 $attempt 次)=$code"
            [ "$code" = "200" ] && break
            sleep 5
          done
          if [ "$code" = "200" ]; then
            {
              echo "ALREADY_LIVE=1"
              echo "SLUG=$SLUG_EXIST"
            } >> "$GITHUB_ENV"
            echo "::notice::《$BOOK_NAME》已在線上(/lens/$SLUG_EXIST),本次跳過重寫,只照常回報成功讓隊列接下一本。"
          else
            echo "線上不是 200(或撞 415)→ 照常開寫,不冒『把沒上線的書當成已上線』的險。"
          fi

      - name: 寫書評 + 轉拆書 + commit(Claude,跑你的訂閱;不 push,push 交給閘門後的 CI)
        if: env.ALREADY_LIVE != '1'
        id: claude          # 給隊列接力步驟判斷:失敗是「引擎自己掛(usage/API)」還是下游品質/收尾
        uses: anthropics/claude-code-action@v1
        env:
          CLAUDE_CODE_EFFORT_LEVEL: high   # 推理力度 high(Opus 4.8 官方建議的智力敏感任務起點;長文寫作品質/省 token 甜蜜點,品質由機械閘門守而非靠拉高 effort);沒生效會退回預設 high、不會弄壞流程
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # token 依 lane 選:lane b 用第二個 Claude 帳號;沒設 CLAUDE_CODE_OAUTH_TOKEN_B 時退回 A(過渡期安全)。
          claude_code_oauth_token: ${{ env.LANE == 'b' && secrets.CLAUDE_CODE_OAUTH_TOKEN_B || secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            請撰寫《${{ env.BOOK_NAME }}》${{ env.AUTHOR_NOTE }}書評。

            你正在 GitHub Actions 雲端跑 CLAUDE.md 的「請撰寫《X》書評」總則鏈。除了下面三點 CI 調整,其餘一字不改、照 CLAUDE.md 與兩支 skill(skills/meowbooks-book-review、skills/painpoint-lens)走,兩篇品質鐵則一個都不准降:

            1) 完整跑兩段、機械閘門全部真的跑:
               ① 喵喵書評寫到定稿 —— P.A.I.N. 審書尺、聲音 DNA、反 AI 味清單、〈定稿三查〉:實跑 `python3 tools/fix-punctuation.py` 全形化、實跑 `python3 tools/count-contrast.py` 把反差句砍到 ≤2、結尾非反差骨架、無撞句指紋。
               ② 自動轉 painpoint 拆書 —— 先做適配檢查(A/B/C 模式),輸出 site/lens/{slug}.php + site/lens/_content/{slug}.html,並**新建一個碎片檔 site/lens/_articles.d/{slug}.php**(只 `return` 該篇一筆陣列:slug/kicker/title/blurb/category/date/**seq**;kicker 固定「拆解《書名》」;**`seq` 必填=寫稿當下 unix 秒,用 `date +%s` 取,越大越新越置頂——只靠 date 會因同日多本打平退化成字母序、新書不在最前**)。**絕對不要編輯 site/lens/_articles.php(它已是 loader)或 site/lens/_articles-base.php(凍結的歷史段)——那會讓平行寫書撞同一檔。** 列表頁與 sitemap 由 loader 讀 base + 所有碎片自動長、最新自動排前。實跑 `python3 tools/fix-punctuation.py` + `python3 tools/count-contrast.py` + `php -l` + 本機 render 自測 /lens/{slug}。拆書必須是換角度重組的獨家文,不照搬書評原句。

            2) 這個環境「沒有」deploy.sh,你也「不要」執行任何部署 / rsync / ssh。**也不要 push、不要 `git pull --rebase`** —— 推送到 main 交給後面的 CI 步驟(它會在機械閘門全過之後,才做 rebase-retry push;壞稿不進 main、平行寫也不互撞)。你只要:兩篇寫好自審過 → `git add` 相關檔(site/lens 下的 {slug}.php、_content/{slug}.html、_articles.d/{slug}.php,以及書評若真的有改到的檔;**絕不要 add _articles.php 或 _articles-base.php**;絕不 `git add -A`、絕不 add 無關檔)→ `git commit`(繁中訊息講清楚動了什麼 + 結尾 Co-Authored-By: Claude trailer)。**commit 完就停,不要 push。**

            3) 收尾兩個檔給 CI 接力(這兩個「不要」git add):把這次拆書的 slug(英文書名 kebab-case、單獨一行,例 atomic-habits)寫進 `.ci/slug.txt`;把「喵喵書評定稿全文」寫進 `.ci/review.txt`(山姆要貼 meowbooks 用)。

            喵喵書評正文不必貼回對話。你在雲端的交付物 = 已 commit(未 push)的 painpoint 拆書 + .ci/ 兩個檔。
          show_full_output: true   # 除錯期間打開:看得到 Claude 實際在做什麼;穩定後可刪
          claude_args: |
            --max-turns 60
            --model claude-opus-4-8
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep,MultiEdit"

      - name: 找出本次 slug
        if: env.ALREADY_LIVE != '1'
        run: |
          echo "STAGE=找slug" >> "$GITHUB_ENV"
          SLUG="$(head -n1 .ci/slug.txt 2>/dev/null | tr -d '[:space:]')"
          if [ -z "$SLUG" ]; then
            SLUG="$(git diff --name-only "$BEFORE_SHA"..HEAD -- 'site/lens/_content/*.html' | head -n1 | xargs -r basename | sed 's/\.html$//')"
          fi
          if [ -z "$SLUG" ]; then echo "::error::找不到新拆書 slug(Claude 沒寫 .ci/slug.txt、也沒新增 _content html)"; exit 1; fi
          echo "SLUG=$SLUG" >> "$GITHUB_ENV"
          echo "本次 slug = $SLUG"

      - name: 閘門 1 — php -l 全 site 語法檢查
        if: env.ALREADY_LIVE != '1'
        run: |
          echo "STAGE=php語法檢查(閘門1)" >> "$GITHUB_ENV"
          fail=0
          while IFS= read -r -d '' f; do
            php -l "$f" >/dev/null 2>&1 || { echo "::error::php -l 失敗:$f"; fail=1; }
          done < <(find site -name '*.php' -print0)
          exit $fail

      - name: 閘門 2 — 反差句/結尾/撞句(count-contrast,沒過就不部署)
        if: env.ALREADY_LIVE != '1'
        run: |
          echo "STAGE=反差句/撞句(閘門2)" >> "$GITHUB_ENV"
          out="$(python3 tools/count-contrast.py "site/lens/_content/$SLUG.html")"
          echo "$out"
          if echo "$out" | grep -q "未過"; then
            echo "::error::count-contrast 未過 → 擋下部署(照 CLAUDE.md 反 AI 味鐵則,壞的不上線)"
            exit 1
          fi

      - name: 閘門 2.5 — CTA 數量(/tool、/book 各 ≤1、結尾不導工具;過量不部署)
        if: env.ALREADY_LIVE != '1'
        run: |
          echo "STAGE=CTA數量(閘門2.5)" >> "$GITHUB_ENV"
          python3 tools/count-cta.py "site/lens/_content/$SLUG.html" || {
            echo "::error::CTA 閘門未過 → 擋下部署(內文導購過量,違反 CTA 北極星:拆書是內容價值、不是導購;見 painpoint-lens skill〈內部連結與導流〉)"; exit 1; }

      - name: 閘門 2.7 — 標題長度(count-title,超長或塞兩段就不部署)
        if: env.ALREADY_LIVE != '1'
        run: |
          echo "STAGE=標題長度(閘門2.7)" >> "$GITHUB_ENV"
          python3 tools/count-title.py "$SLUG" || {
            echo "::error::標題閘門未過 → 擋下部署(卡片 title／heading／<h1> 任一 >32 字或含全形分號「；」;防 2026-06-28 長標漂移重演,見 painpoint-lens skill〈標題〉)"; exit 1; }

      - name: 閘門 3 — 本機 render 測 /lens/{slug}
        if: env.ALREADY_LIVE != '1'
        run: |
          echo "STAGE=本機render(閘門3)" >> "$GITHUB_ENV"
          php -S 127.0.0.1:8080 site/router.php >/tmp/php.log 2>&1 &
          PHP_PID=$!
          ok=0
          for i in $(seq 1 20); do
            curl -fsS "http://127.0.0.1:8080/lens/$SLUG" -o /tmp/page.html 2>/dev/null && { ok=1; break; }
            sleep 0.5
          done
          kill $PHP_PID 2>/dev/null || true
          if [ "$ok" != 1 ] || [ ! -s /tmp/page.html ]; then
            echo "::error::render /lens/$SLUG 失敗"; cat /tmp/php.log; exit 1
          fi
          echo "render OK:$(wc -c </tmp/page.html) bytes"

      - name: 推送到 main(rebase-retry;三道閘門都過才推)
        if: env.ALREADY_LIVE != '1'
        run: |
          echo "STAGE=推送push(git rebase/push)" >> "$GITHUB_ENV"
          # Claude 已在本機 commit(沒 push)。閘門全過,才在這裡 deterministic 地 rebase + push:
          #   - 壞稿(任一閘門沒過)→ 上面早就 exit,根本不會到這步 → 壞 commit 永不進 main。
          #   - 平行 lane / recommend-books 同時推 → 碎片化後各篇檔 disjoint,rebase 乾淨;被搶先就重抓重試。
          #   - 真衝突(極罕見,例如撞同一個 slug)→ 放棄、回報 quality 讓隊列跳過這本,不無限重試。
          if [ "$(git rev-parse HEAD)" = "$BEFORE_SHA" ]; then
            echo "::error::Claude 沒有產生新 commit(HEAD 沒前進)→ 沒東西可推,當品質失敗處理"; exit 1
          fi
          # 防呆:Claude commit 後若工作目錄還留著「tracked 檔的未暫存改動」,git rebase 會直接報
          #   "You have unstaged changes" 而失敗(2026-06-30:.ci/ 被誤入版控,每次寫書都踩這顆雷,整批 push 全掛)。
          #   交付物已 commit、是正本,閘門也跑在工作目錄(== 已 commit 的 slug 檔);新書照碎片架構只新增檔、
          #   不該動到任何共享 tracked 檔。所以這裡把殘留的未暫存 tracked 改動丟掉,讓 rebase 乾淨。
          #   (.ci/ 等 scratch 已加進 .gitignore → untracked,不受影響、後續步驟照樣讀得到。)
          if ! git diff --quiet; then
            echo "::warning::commit 後仍有未暫存的 tracked 改動,丟棄以免卡住 rebase:"; git status --short
            git checkout -- .
          fi
          ok=0
          for attempt in 1 2 3 4 5; do
            git fetch origin main || { echo "::warning::fetch 第 $attempt 次失敗,重試…"; sleep 3; continue; }
            if git rebase origin/main; then
              if git push origin main; then ok=1; break; fi
              echo "::warning::push 第 $attempt 次被搶先(non-fast-forward),重抓重試…"
              sleep 3
            else
              git rebase --abort || true
              echo "::error::rebase 衝突(可能與其他 lane 撞同一個 slug/檔)→ 放棄推送,回報 quality 讓隊列跳過"
              exit 1
            fi
          done
          [ "$ok" = 1 ] || { echo "::error::連續 5 次都被搶先 push,放棄(回報 quality,稍後隊列會重試這本)"; exit 1; }
          echo "✅ 已推送到 main:$(git rev-parse --short HEAD)"

      - name: 部署到 Cloudways(三道閘門都過才跑)
        if: env.ALREADY_LIVE != '1'
        env:
          SSH_KEY: ${{ secrets.CLOUDWAYS_SSH_KEY }}
        run: |
          echo "STAGE=部署Cloudways" >> "$GITHUB_ENV"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # rsync 加重試:SSH/rsync 偶發瞬斷不該害「三道閘門都過的好書」沒上線(2026-06-27《美軍四星上將》就栽在這)。
          ok=0
          for attempt in 1 2 3; do
            if rsync -rtz --no-perms --omit-dir-times --exclude='.DS_Store' \
                 -e "ssh -p 22 -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30" \
                 site/ "$SSH_HOST:$REMOTE_PATH"; then
              ok=1; break
            fi
            echo "::warning::部署第 $attempt 次失敗,8 秒後重試…"
            sleep 8
          done
          rm -f ~/.ssh/deploy_key
          # 不再因 SSH 部署失敗就讓整個 job 失敗:主機端 git-deploy.php(每 5 分 pull)是可靠的部署來源,
          # 只要這次有 git push 成功,書最遲 5 分鐘會被主機自己同步上線。這條 SSH rsync 只是「能通就立刻上線」的快路,
          # 通不了(415/SSH ban)就交給主機 pull,絕不該誤報失敗害書被當沒上線重寫。
          [ "$ok" = 1 ] && echo "SSH 部署成功(立即上線)" || echo "::warning::SSH 部署沒成功(415/ban),交給主機 git-deploy 在 ~5 分內 pull 上線"

      - name: 回報上線網址
        run: |
          if [ "$ALREADY_LIVE" = "1" ]; then
            {
              echo "## ℹ️ 本來就已上線,跳過重寫"
              echo ""
              echo "**《$BOOK_NAME》** 之前已寫好並上線,看門狗把它排回來、本次自動跳過整篇重寫(不白燒額度、不覆蓋線上好文):"
              echo ""
              echo "🔗 https://painpoint.tw/lens/$SLUG"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## ✅ 上線了"
              echo ""
              echo "**《$BOOK_NAME》** 拆書已部署:"
              echo ""
              echo "🔗 https://painpoint.tw/lens/$SLUG"
              echo ""
              echo "_喵喵書評定稿在這次 run 的 Artifacts(meowbooks-review)可下載,貼 meowbooks 用。_"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 上傳喵喵書評定稿(手機可下載貼 meowbooks)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: meowbooks-review
          path: .ci/
          if-no-files-found: ignore

      - name: 回傳結果到 Telegram(若有設 bot secret)
        if: always()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}
        run: |
          [ -z "$TG_BOT_TOKEN" ] && exit 0
          if [ "$ALREADY_LIVE" = "1" ] && [ -n "$SLUG" ]; then
            TEXT="ℹ️《${BOOK_NAME}》本來就已經在線上了:https://painpoint.tw/lens/${SLUG} —— 看門狗排回來、系統自動跳過重寫,直接接下一本。"
          elif [ "$JOB_STATUS" = "success" ] && [ -n "$SLUG" ]; then
            TEXT="✅《${BOOK_NAME}》拆書上線了:https://painpoint.tw/lens/${SLUG}"
          elif [ "$CLAUDE_OUTCOME" = "failure" ]; then
            # 引擎失敗(疑似該帳號額度滿 / token 壞)→ 這裡「不發」,交給隊列那則「帳號暫停/恢復」的去重通知處理,
            # 避免額度滿期間每次探路重試都洗一則失敗訊息。
            exit 0
          else
            # 帶上「掛在哪一關」(STAGE 由各步驟在開頭寫進 $GITHUB_ENV;job 失敗時 = 最後啟動的那步)。
            # 一看就分得出是「個別書的內容問題」(反差句/標題/CTA)還是「系統性故障」(推送push/部署/php語法/找slug)。
            WHERE="${STAGE:-未知步驟}"
            case "$WHERE" in
              推送push*|部署*|找slug*|php語法*) HINT="(看起來是系統性故障,不是這本書的內容問題——若連續好幾本都卡同一關,隊列會自動暫停並通知)";;
              *) HINT="(這關通常是個別書的內容沒過,其他書照跑)";;
            esac
            TEXT="⚠️《${BOOK_NAME}》這次沒成功,卡在【${WHERE}】這一關,沒有上線。${HINT} 詳情看 GitHub Actions。"
          fi
          curl -sS "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "text=${TEXT}" >/dev/null || true

      - name: 隊列接力:回報成功/失敗、決定下一本(優先走 SSH、繞過 HTTP 415)
        if: always()
        env:
          SSH_KEY: ${{ secrets.CLOUDWAYS_SSH_KEY }}
          TG_QUEUE_SECRET: ${{ secrets.TG_QUEUE_SECRET }}
          JOB_STATUS: ${{ job.status }}
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}   # success / failure —— 只有它 failure 才算「引擎掛」
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            STATUS=success; KIND=
          else
            # 分辨失敗種類:Claude 引擎那步自己報錯(usage/API/中斷)→ engine(會累計、達門檻才暫停);
            # 其餘(寫一半沒 slug、品質閘沒過、部署瞬斷)→ quality(跳過這本、繼續下一本,絕不暫停)。
            STATUS=failure; KIND=quality
            [ "$CLAUDE_OUTCOME" = "failure" ] && KIND=engine
          fi

          # ── 主要通道:SSH 進主機用 PHP CLI 回報 ──────────────────────────────
          # 為什麼:Cloudways 對 GitHub IP 的 HTTP 415 會「持續封鎖好幾分鐘」(實證《設計思考》重試 30 次/5 分全 415),
          # 從同一台被封的 runner 狂重試 HTTP 沒用;但同一個 run 的 SSH 部署是成功的 → SSH(22)沒被擋、只有 HTTP(443)被擋。
          # 所以回報改走 SSH,完全避開 415。book 用 base64 傳,避開書名含冒號/空白的 shell 跳脫。q_report 冪等 → 重複呼叫 0 風險。
          ok=0
          if [ -n "$SSH_KEY" ]; then
            install -m 700 -d ~/.ssh
            printf '%s\n' "$SSH_KEY" > ~/.ssh/report_key
            chmod 600 ~/.ssh/report_key
            BOOK_B64=$(printf '%s' "$BOOK_NAME" | base64 | tr -d '\n')
            for attempt in 1 2 3; do
              if out=$(ssh -p 22 -i ~/.ssh/report_key -o IdentitiesOnly=yes -o BatchMode=yes \
                         -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 "$SSH_HOST" \
                         "php ${REMOTE_PATH}api/queue-report-cli.php '$STATUS' '$KIND' '$BOOK_B64' '${LANE:-a}'" 2>&1); then
                echo "SSH 回報成功(第 $attempt 次):$out"; ok=1; break
              fi
              echo "::warning::SSH 回報第 $attempt 次失敗($out),5 秒後重試…"; sleep 5
            done
            rm -f ~/.ssh/report_key
          fi

          # ── 後備通道:SSH 全失敗才走 HTTP GET(帶 book 冪等,短重試 ~2 分)──────
          if [ "$ok" != 1 ] && [ -n "$TG_QUEUE_SECRET" ]; then
            echo "SSH 沒成功,改走 HTTP 後備…"
            Q="action=report&status=$STATUS"; [ -n "$KIND" ] && Q="$Q&kind=$KIND"
            Q="$Q&lane=${LANE:-a}"
            for attempt in $(seq 1 12); do
              code=$(curl -sS -G -o /dev/null -w '%{http_code}' --max-time 20 \
                --data-urlencode "book=${BOOK_NAME}" \
                "https://painpoint.tw/api/tg-queue?$Q" \
                -H "X-Queue-Token: ${TG_QUEUE_SECRET}" || echo 000)
              echo "HTTP 後備嘗試 $attempt → $code"
              [ "$code" = "200" ] && { ok=1; break; }
              sleep 10
            done
          fi

          [ "$ok" = 1 ] || echo "::warning::SSH+HTTP 都沒送達;看門狗會在 ~30 分內接手(冪等,不會掉書/重複)"
